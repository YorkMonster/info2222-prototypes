<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Group Project Communication Prototype</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        height: 100vh;
    }

    /* Layout */
    .sidebar {
        width: 28%;
        background: #ffffff;
        border-right: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        padding: 20px;
    }

    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* Chat Area */
    .chat-window {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: #fafafa;
        border-bottom: 1px solid #ddd;
    }

    .chat-message {
        margin-bottom: 15px;
        padding: 10px;
        background: #fff;
        border-radius: 6px;
        border: 1px solid #ddd;
    }

    .chat-input {
        display: flex;
        padding: 10px;
        background: #fff;
    }

    .chat-input input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    .chat-input button {
        margin-left: 10px;
        padding: 10px 16px;
        border: none;
        background: #0077cc;
        color: white;
        border-radius: 6px;
        cursor: pointer;
    }

    /* Sidebar Panels */
    h2 {
        margin-top: 0;
        font-size: 20px;
    }

    .panel {
        margin-bottom: 30px;
    }

    .task {
        background: #eef6ff;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 10px;
        border: 1px solid #cfe2ff;
    }

    .task span {
        display: block;
        font-size: 14px;
    }

    .summary-box {
        background: #fff7e6;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ffe0b3;
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="panel">
        <h2>AI Summary</h2>
        <div class="summary-box" id="summaryBox">
            Recent discussion summary will appear here.
        </div>
    </div>

    <div class="panel">
        <h2>Task List</h2>
        <div id="taskList">
            <!-- Tasks will be inserted here -->
        </div>
    </div>
</div>

<!-- Main Chat Area -->
<div class="main">
    <div class="chat-window" id="chatWindow">
        <div class="chat-message">Welcome to the group project chat!</div>
    </div>

    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById("chatWindow");
    const summaryBox = document.getElementById("summaryBox");
    const taskList = document.getElementById("taskList");

    const sampleTasks = [
        { task: "Write introduction section", student: "Alex", deadline: "March 12" },
        { task: "Prepare survey questions", student: "Jordan", deadline: "March 14" },
        { task: "Create presentation slides", student: "Sam", deadline: "March 18" }
    ];

    function renderTasks() {
        taskList.innerHTML = "";
        sampleTasks.forEach(t => {
            const div = document.createElement("div");
            div.className = "task";
            div.innerHTML = `
                <strong>${t.task}</strong>
                <span>Assigned to: ${t.student}</span>
                <span>Deadline: ${t.deadline}</span>
            `;
            taskList.appendChild(div);
        });
    }

    renderTasks();

    function sendMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;

        const msg = document.createElement("div");
        msg.className = "chat-message";
        msg.textContent = text;
        chatWindow.appendChild(msg);

        input.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        updateSummary(text);
    }

    function updateSummary(latestMessage) {
        summaryBox.textContent = "Students are discussing: " + latestMessage;
    }
</script>

</body>
</html>
